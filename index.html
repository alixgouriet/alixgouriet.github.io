<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Site</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400&display=swap');

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --accent: #c8ff00;
      --text: #f0ede6;
      --muted: #666;
      --border: #222;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.6s ease both;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 2rem;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 5rem 3rem;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .hero {
      max-width: 700px;
    }

    .tag {
      display: inline-block;
      background: var(--accent);
      color: #000;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      margin-bottom: 1.8rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      line-height: 1.1;
      margin-bottom: 1.5rem;
      font-weight: 700;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    p.intro {
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
      max-width: 480px;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: var(--accent);
      color: #000;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn:hover { opacity: 0.85; transform: translateY(-2px); }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      margin-left: 1rem;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    footer {
      padding: 1.5rem 3rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    footer span {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Mon Site</div>
    <nav>
      <a href="#">Accueil</a>
      <a href="#">À propos</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <div class="hero">
      <span class="tag">Bienvenue</span>
      <h1>Bonjour, je suis <em>ici</em>.</h1>
      <p class="intro">
        Une page d'accueil simple, propre et prête à être personnalisée.
        Modifie le texte, les couleurs et la navigation selon tes besoins.
      </p>
      <a href="#" class="btn">Commencer</a>
      <a href="#" class="btn btn-ghost">En savoir plus</a>
    </div>
  </main>

  <footer>
    <span>© 2026 Mon Site</span>
    <span>Fait avec HTML & CSS</span>
  </footer>

</body>
</html>
